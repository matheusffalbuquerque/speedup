<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍽️ Food Around the World — SpeakUp Root L04</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d0d1a; --surface: #14142a; --surface2: #1c1c38; --surface3: #24243e;
      --accent: #e94560; --gold: #f5a623; --green: #1db954; --blue: #3b82f6;
      --text: #e8e8f0; --muted: #7a7a9a; --border: #2a2a45; --r: 10px;
    }
    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── SETUP ── */
    #setupScreen {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: radial-gradient(ellipse at 50% 30%, #1a1a35 0%, var(--bg) 70%);
    }
    .setup-title { font-size: 2rem; font-weight: 800; }
    .setup-title span { background: linear-gradient(90deg,#f5a623,#e94560); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .setup-sub { color: var(--muted); font-size: 0.88rem; }
    .setup-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 26px 30px; width: 430px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .setup-card h3 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }
    .p-row { display: flex; align-items: center; gap: 10px; }
    .p-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
    .p-row input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 0.88rem;
      outline: none; transition: border-color .2s;
    }
    .p-row input:focus { border-color: var(--gold); }
    .row-gap { display: flex; gap: 8px; }

    /* ── BUTTONS ── */
    .btn {
      padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 0.86rem; font-weight: 700; transition: all .15s; white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #c93450; }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-gold:hover { background: #d98e10; }
    .btn-green { background: var(--green); color: #fff; }
    .btn-green:hover { background: #17a045; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface3); }
    .btn-block { width: 100%; }
    .btn-sm { padding: 6px 12px; font-size: 0.78rem; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── GAME SCREEN ── */
    #gameScreen { display: none; flex-direction: column; height: 100vh; }

    /* Header */
    #gh {
      height: 44px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 14px; gap: 12px; flex-shrink: 0;
    }
    .gh-title { font-size: 0.9rem; font-weight: 800; background: linear-gradient(90deg,#f5a623,#e94560); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; letter-spacing: .5px; }
    .b-red { background: var(--accent); color: #fff; }
    .b-gold { background: var(--gold); color: #000; }
    .b-gray { background: var(--surface3); color: var(--muted); }
    .b-blue { background: var(--blue); color: #fff; }
    .b-green { background: var(--green); color: #fff; }
    .gh-right { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: var(--muted); }
    .gh-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; }

    /* Grid */
    #gm { display: grid; grid-template-columns: 192px 1fr 308px; flex: 1; min-height: 0; overflow: hidden; }

    /* ── PLAYER PANEL ── */
    #pp { background: var(--surface); border-right: 1px solid var(--border); padding: 8px 7px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
    .phd { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); padding: 0 3px 4px; }
    .pc { background: var(--surface2); border: 2px solid transparent; border-radius: 10px; padding: 8px 9px; transition: border-color .2s, background .2s; }
    .pc.active { border-color: var(--gold); background: #1e1500; }
    .pc.waiter { border-color: var(--blue); background: #0d1628; }
    .pc.done { border-color: #333; opacity: .65; }
    .pc-top { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .pc-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .pc-name { font-weight: 700; font-size: 0.82rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mini-badge { font-size: 0.58rem; padding: 2px 5px; border-radius: 4px; font-weight: 700; flex-shrink: 0; }
    .mb-gold { background: var(--gold); color: #000; }
    .mb-blue { background: var(--blue); color: #fff; }
    .mb-green { background: var(--green); color: #fff; }
    .pc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
    .pc-stat { display: flex; flex-direction: column; }
    .pc-lbl { font-size: 0.58rem; color: var(--muted); }
    .pc-val { font-size: 0.8rem; font-weight: 700; }
    .pc-loc { font-size: 0.62rem; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* ── BOARD ── */
    #bs { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; position: relative; overflow: hidden; }
    #boardSVG { max-width: min(100%, calc(100vh - 120px)); max-height: calc(100vh - 120px); }
    #diceZone { position: absolute; bottom: 10px; display: flex; align-items: center; gap: 10px; }
    .dice-face {
      width: 54px; height: 54px; background: #fff; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 2.2rem;
      box-shadow: 0 4px 18px rgba(0,0,0,.6); user-select: none;
    }
    .dice-face.rolling { animation: spin .5s ease-in-out; }
    @keyframes spin { 0%{transform:rotate(0) scale(1)} 30%{transform:rotate(120deg) scale(1.15)} 70%{transform:rotate(260deg) scale(.9)} 100%{transform:rotate(360deg) scale(1)} }

    /* ── ACTION PANEL ── */
    #ap { background: var(--surface); border-left: 1px solid var(--border); padding: 10px 10px; display: flex; flex-direction: column; gap: 0; overflow-y: auto; }
    .ap-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 8px; }
    .ap-heading { font-size: 1rem; font-weight: 800; color: var(--gold); margin-bottom: 4px; }
    .ap-sub { font-size: 0.78rem; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
    .rest-card { border-radius: 10px; padding: 11px 13px; margin-bottom: 10px; }
    .rest-card-top { display: flex; align-items: center; gap: 9px; }
    .rest-flag { font-size: 1.6rem; }
    .rest-name { font-weight: 800; font-size: 0.92rem; }
    .rest-cuisine { font-size: 0.7rem; opacity: .8; }

    /* Menu */
    .menu-wrap { max-height: 200px; overflow-y: auto; margin-bottom: 8px; }
    .msec-title { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 2px; margin: 6px 0 3px; }
    .mi { display: flex; justify-content: space-between; align-items: center; padding: 4px 6px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: background .12s; border: 1px solid transparent; }
    .mi:hover { background: var(--surface3); }
    .mi.sel { background: #0e2b0e; border-color: var(--green); }
    .mi-price { color: var(--green); font-weight: 700; font-size: 0.78rem; }

    /* Order summary */
    .order-box { background: var(--surface2); border-radius: 8px; padding: 9px; margin-bottom: 8px; }
    .o-item { display: flex; justify-content: space-between; font-size: 0.78rem; padding: 2px 0; }
    .o-total { border-top: 1px solid var(--border); margin-top: 5px; padding-top: 5px; display: flex; justify-content: space-between; font-weight: 800; font-size: 0.85rem; }
    .warn { font-size: 0.72rem; text-align: center; color: var(--accent); margin-top: 4px; }
    .ok-msg { font-size: 0.72rem; text-align: center; color: var(--green); margin-top: 4px; }

    /* Phrase hint */
    .phrase-box { background: #10200e; border: 1px solid #1a4a1a; border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; font-size: 0.75rem; line-height: 1.6; }
    .phrase-box strong { color: var(--green); }

    /* Review cards */
    .rv-card { background: var(--surface2); border-radius: 8px; padding: 9px; margin-bottom: 7px; }
    .rv-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
    .rv-info { flex: 1; min-width: 0; }
    .rv-name { font-weight: 700; font-size: 0.82rem; }
    .rv-sub { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
    .rv-items { font-size: 0.72rem; color: #aaa; margin-bottom: 4px; }
    .mark-row { display: flex; gap: 4px; flex-shrink: 0; }
    .mk { width: 28px; height: 28px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: all .15s; opacity: .6; }
    .mk:hover { opacity: 1; }
    .mk.on { opacity: 1; box-shadow: 0 0 0 2.5px rgba(255,255,255,.4); }
    .mk-ok { background: var(--green); }
    .mk-no { background: var(--accent); }
    .rv-result { font-size: 0.7rem; margin-top: 3px; }

    /* Scoreboard */
    .score-row { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; margin-bottom: 5px; }
    .score-row.gold-row { background: #1e1500; border: 1px solid var(--gold); }
    .score-row.norm-row { background: var(--surface2); border: 1px solid var(--border); }
    .score-rank { font-size: 1.1rem; }
    .score-name { flex: 1; font-weight: 700; font-size: 0.88rem; }
    .score-pts { font-size: 1.05rem; font-weight: 800; color: var(--gold); }

    /* Toast */
    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 22px; font-size: 0.85rem; z-index: 999;
      opacity: 0; transition: opacity .25s; pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }
    .sep { height: 1px; background: var(--border); margin: 8px 0; }
  </style>
</head>

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let gs = {
  phase: 'setup',   // setup | roll | menu | ordering | orderScore | delivery | billing | roundEnd
  players: [],
  cur: 0,           // current player index (during roll phase)
  round: 1,
  orders: [],       // { pi, pName, pColor, estIdx, items, total, waiterId, oScore, dScore, bScore }
  sel: [],          // selected menu items during ordering
};

// ═══════════════════════════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════════════════════════
let pCount = 3;

function renderSetup() {
  const c = document.getElementById('pInputs');
  c.innerHTML = '';
  for (let i = 0; i < pCount; i++) {
    const d = document.createElement('div');
    d.className = 'p-row';
    d.style.marginBottom = '6px';
    d.innerHTML = `<div class="p-dot" style="background:${COLORS[i]}"></div>
      <input type="text" id="pn${i}" placeholder="Player ${i+1}" value="Player ${i+1}">`;
    c.appendChild(d);
  }
}

function addPlayer()    { if (pCount < 5) { pCount++; renderSetup(); } }
function removePlayer() { if (pCount > 2) { pCount--; renderSetup(); } }

function startGame() {
  const players = [];
  for (let i = 0; i < pCount; i++) {
    const name = document.getElementById(`pn${i}`).value.trim() || `Player ${i+1}`;
    players.push({ name, color: COLORS[i], pos: 0, money: 100, score: 0 });
  }
  gs = { phase:'roll', players, cur:0, round:1, orders:[], sel:[] };
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';
  drawBoard();
  render();
}

// ═══════════════════════════════════════════════════════════
//  BOARD
// ═══════════════════════════════════════════════════════════
function drawBoard() {
  const svg  = document.getElementById('boardSVG');
  const cx = 270, cy = 270, R = 215, sr = 37;
  const n  = EST.length;
  let h = '';

  // Dark background
  h += `<rect width="540" height="540" rx="18" fill="#0d0d1a"/>`;
  // Outer deco ring
  h += `<circle cx="${cx}" cy="${cy}" r="${R+46}" fill="none" stroke="#1e1e38" stroke-width="1.5" stroke-dasharray="5,5"/>`;
  // Track band
  h += `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#1e1e38" stroke-width="${sr*2+4}"/>`;
  h += `<circle cx="${cx}" cy="${cy}" r="${R+sr+2}" fill="none" stroke="#2a2a45" stroke-width="1.5"/>`;
  h += `<circle cx="${cx}" cy="${cy}" r="${R-sr-2}" fill="none" stroke="#2a2a45" stroke-width="1.5"/>`;

  // Center circle
  h += `<circle cx="${cx}" cy="${cy}" r="76" fill="#14142a" stroke="#2a2a45" stroke-width="2"/>`;
  h += `<text x="${cx}" y="${cy-26}" text-anchor="middle" font-size="26">🍽️</text>`;
  h += `<text x="${cx}" y="${cy-4}"  text-anchor="middle" fill="#f5a623" font-size="12" font-weight="800" letter-spacing="0.5">FOOD AROUND</text>`;
  h += `<text x="${cx}" y="${cy+13}" text-anchor="middle" fill="#f5a623" font-size="12" font-weight="800" letter-spacing="0.5">THE WORLD</text>`;
  h += `<text x="${cx}" y="${cy+32}" text-anchor="middle" fill="#555"    font-size="9">SpeakUp · Root L04</text>`;

  // Spaces
  EST.forEach((e, i) => {
    const a = -Math.PI/2 + (2*Math.PI/n)*i;
    const x = cx + R*Math.cos(a);
    const y = cy + R*Math.sin(a);
    const words = e.name.split(' ');
    const l1 = words.slice(0, Math.ceil(words.length/2)).join(' ');
    const l2 = words.slice(Math.ceil(words.length/2)).join(' ');
    h += `<g style="cursor:pointer" onclick="spaceInfo(${i})">
      <circle cx="${x}" cy="${y}" r="${sr}" fill="${e.color}" stroke="#0d0d1a" stroke-width="3"/>
      <circle cx="${x}" cy="${y}" r="${sr}" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
      <text x="${x}" y="${y-9}"  text-anchor="middle" font-size="17" dominant-baseline="middle">${e.flag}</text>
      <text x="${x}" y="${y+9}"  text-anchor="middle" fill="white" font-size="7.5" font-weight="700">${l1}</text>
      <text x="${x}" y="${y+19}" text-anchor="middle" fill="white" font-size="7.5" font-weight="700">${l2}</text>
      <text x="${x+sr-7}" y="${y-sr+13}" text-anchor="middle" fill="rgba(255,255,255,.7)" font-size="8.5" font-weight="800">${i+1}</text>
    </g>`;
  });

  h += `<g id="tokens"></g>`;
  svg.innerHTML = h;
  updateTokens();
}

function updateTokens() {
  const g = document.getElementById('tokens');
  if (!g) return;
  const cx=270, cy=270, R=215, n=EST.length;
  const groups = {};
  gs.players.forEach((p,i) => { (groups[p.pos] = groups[p.pos]||[]).push({p,i}); });
  const offsets = [[0,0],[-9,-9],[9,-9],[-9,9],[9,9]];
  let h = '';
  Object.entries(groups).forEach(([pos, arr]) => {
    const a = -Math.PI/2 + (2*Math.PI/n)*parseInt(pos);
    const bx = cx + R*Math.cos(a), by = cy + R*Math.sin(a);
    arr.forEach(({p,i}, gi) => {
      const [ox,oy] = offsets[Math.min(gi, offsets.length-1)];
      const tx = bx+ox, ty = by+oy;
      const isActive = i===gs.cur && gs.phase==='roll';
      h += `<circle cx="${tx}" cy="${ty}" r="9.5" fill="${p.color}" stroke="${isActive?'white':'#0d0d1a'}" stroke-width="${isActive?2.5:1.5}"/>`;
      h += `<text x="${tx}" y="${ty+3.5}" text-anchor="middle" fill="white" font-size="8" font-weight="800" dominant-baseline="middle">${p.name[0].toUpperCase()}</text>`;
    });
  });
  g.innerHTML = h;
}

function spaceInfo(i) {
  const e = EST[i];
  toast(`${e.flag} ${e.name} — ${e.cuisine}`);
}

// ═══════════════════════════════════════════════════════════
//  DICE & MOVEMENT
// ═══════════════════════════════════════════════════════════
function rollDice() {
  if (gs.phase !== 'roll') return;
  document.getElementById('rollBtn').disabled = true;
  const el = document.getElementById('diceEl');
  el.classList.add('rolling');
  let t = 0;
  const iv = setInterval(() => {
    el.textContent = DICE_FACES[Math.floor(Math.random()*6)];
    t++;
    if (t >= 12) {
      clearInterval(iv);
      el.classList.remove('rolling');
      const result = Math.floor(Math.random()*6)+1;
      el.textContent = DICE_FACES[result-1];
      animateMove(result);
    }
  }, 80);
}

function animateMove(steps) {
  const p = gs.players[gs.cur];
  const start = p.pos;
  let s = 0;
  const iv = setInterval(() => {
    s++;
    p.pos = (start + s) % EST.length;
    updateTokens();
    if (s >= steps) {
      clearInterval(iv);
      gs.phase = 'menu';
      gs.sel = [];
      render();
    }
  }, 220);
}

// ═══════════════════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════════════════
function waiterIdx() { return (gs.cur+1) % gs.players.length; }

function allOrdered() { return gs.orders.length >= gs.players.length; }

function toggleItem(cat, idx) {
  const item = EST[gs.players[gs.cur].pos].menu[cat][idx];
  const key  = `${cat}|${idx}`;
  const ei   = gs.sel.findIndex(x => x.key === key);
  if (ei >= 0) gs.sel.splice(ei, 1);
  else gs.sel.push({ key, n: item.n, p: item.p });
  render();
}

function confirmOrder() {
  const p   = gs.players[gs.cur];
  const tot = gs.sel.reduce((s,x) => s+x.p, 0);
  if (!gs.sel.length)   { toast('⚠️ Select at least one item!'); return; }
  if (tot > p.money)    { toast('⚠️ Over budget!'); return; }
  p.money -= tot;
  gs.orders.push({
    pi: gs.cur, pName: p.name, pColor: p.color,
    estIdx: p.pos, items: [...gs.sel], total: tot,
    waiterId: waiterIdx(), waiterName: gs.players[waiterIdx()].name,
    oScore: null, dScore: null, bScore: null,
  });
  gs.sel = [];
  gs.phase = 'orderScore';
  render();
}

function markOrderScore(val) {
  const o = gs.orders[gs.orders.length-1];
  if (o.oScore !== null) return;
  o.oScore = val;
  if (val) gs.players[o.pi].score += 15;
  render();
}

function nextTurn() {
  if (allOrdered()) {
    gs.phase = 'delivery';
    gs.cur   = 0;
  } else {
    // advance to next player who hasn't ordered yet
    let next = (gs.cur+1) % gs.players.length;
    while (gs.orders.find(o => o.pi === next)) next = (next+1) % gs.players.length;
    gs.cur   = next;
    gs.phase = 'roll';
  }
  render();
}

function markDelivery(i, val) {
  const o = gs.orders[i];
  if (o.dScore !== null) return;
  o.dScore = val;
  if (val) {
    gs.players[o.waiterId].score += 15;
    gs.players[o.waiterId].money += 10;
  }
  render();
}

function markBilling(i, val) {
  const o = gs.orders[i];
  if (o.bScore !== null) return;
  o.bScore = val;
  if (val) gs.players[o.pi].score += 10;
  render();
}

function endRound() {
  gs.phase = 'roundEnd';
  render();
}

function nextRound() {
  gs.round++;
  gs.orders = [];
  gs.sel    = [];
  gs.cur    = 0;
  gs.phase  = 'roll';
  render();
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  renderHeader();
  renderPlayers();
  renderAction();
  updateTokens();
  // Dice button visibility
  const rb = document.getElementById('rollBtn');
  rb.style.display  = gs.phase === 'roll' ? 'block' : 'none';
  rb.disabled       = false;
}

function renderHeader() {
  const phaseMap = {
    roll:'🎲 ROLL', menu:'📋 MENU', ordering:'🛒 ORDER',
    orderScore:'⭐ SCORING', delivery:'🍽️ DELIVERY', billing:'💳 BILLING', roundEnd:'🏆 RESULTS',
  };
  const colorMap = {
    roll:'b-red', menu:'b-gray', ordering:'b-gold',
    orderScore:'b-green', delivery:'b-blue', billing:'b-gold', roundEnd:'b-red',
  };
  document.getElementById('phaseBadge').className = `badge ${colorMap[gs.phase]||'b-gray'}`;
  document.getElementById('phaseBadge').textContent = phaseMap[gs.phase] || gs.phase.toUpperCase();
  document.getElementById('roundBadge').textContent = `Round ${gs.round}`;

  const p = gs.players[gs.cur];
  if (p) {
    document.getElementById('ghPlayerDot').style.background = p.color;
    document.getElementById('ghPlayerName').textContent     = p.name;
    if (gs.phase === 'ordering') {
      document.getElementById('ghExtra').textContent = `→ Waiter: ${gs.players[waiterIdx()].name}`;
    } else if (gs.phase === 'delivery' || gs.phase === 'billing' || gs.phase === 'roundEnd') {
      document.getElementById('ghExtra').textContent = '— All Players';
    } else {
      document.getElementById('ghExtra').textContent = '';
    }
  }
}

function renderPlayers() {
  const c = document.getElementById('playerCards');
  c.innerHTML = gs.players.map((p,i) => {
    const isActive  = i === gs.cur && ['roll','menu','ordering','orderScore'].includes(gs.phase);
    const isWaiter  = i === waiterIdx() && gs.phase === 'ordering';
    const hasDone   = gs.orders.some(o => o.pi === i) && gs.phase === 'roll';
    const est       = EST[p.pos];
    return `<div class="pc ${isActive?'active':''} ${isWaiter?'waiter':''} ${hasDone?'done':''}">
      <div class="pc-top">
        <div class="pc-dot" style="background:${p.color}"></div>
        <div class="pc-name">${p.name}</div>
        ${isActive  ? `<span class="mini-badge mb-gold">🎲 Active</span>` : ''}
        ${isWaiter  ? `<span class="mini-badge mb-blue">🍽️ Waiter</span>` : ''}
        ${hasDone   ? `<span class="mini-badge mb-green">✅ Done</span>`  : ''}
      </div>
      <div class="pc-stats">
        <div class="pc-stat"><span class="pc-lbl">💰 Budget</span><span class="pc-val" style="color:#1db954">$${p.money}</span></div>
        <div class="pc-stat"><span class="pc-lbl">⭐ Score</span><span class="pc-val" style="color:#f5a623">${p.score}pts</span></div>
      </div>
      <div class="pc-loc">📍 ${est.flag} ${est.name}</div>
    </div>`;
  }).join('');
}

function renderAction() {
  const c = document.getElementById('apContent');
  const ph = gs.phase;
  if      (ph === 'roll')       c.innerHTML = renderRoll();
  else if (ph === 'menu')       c.innerHTML = renderMenu();
  else if (ph === 'ordering')   c.innerHTML = renderOrdering();
  else if (ph === 'orderScore') c.innerHTML = renderOrderScore();
  else if (ph === 'delivery')   c.innerHTML = renderDelivery();
  else if (ph === 'billing')    c.innerHTML = renderBilling();
  else if (ph === 'roundEnd')   c.innerHTML = renderRoundEnd();
}

// ── ROLL ──
function renderRoll() {
  const p = gs.players[gs.cur];
  const statusList = gs.players.map((pl,i) => {
    const done = gs.orders.some(o => o.pi === i);
    const isCur = i === gs.cur;
    return `<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:.78rem">
      <div class="pc-dot" style="background:${pl.color};width:8px;height:8px"></div>
      <span>${pl.name}</span>
      <span style="margin-left:auto;color:${done?'#1db954':isCur?'#f5a623':'#555'}">
        ${done?'✅ ordered':isCur?'🎲 rolling...':'⏳ waiting'}
      </span></div>`;
  }).join('');
  return `<div class="ap-title">🎲 Roll Phase — Round ${gs.round}</div>
    <div class="ap-heading">${p.name}'s Turn</div>
    <div class="ap-sub">Roll the dice and travel the world! 🌍<br>
      <span style="color:#f5a623">Budget: $${p.money}</span></div>
    <div class="sep"></div>
    <div class="ap-title">Status</div>
    ${statusList}`;
}

// ── MENU PREVIEW ──
function renderMenu() {
  const p   = gs.players[gs.cur];
  const est = EST[p.pos];
  const w   = gs.players[waiterIdx()];
  return `<div class="ap-title">📋 You Arrived At</div>
    <div class="rest-card" style="background:linear-gradient(135deg,${est.color},${est.color}aa)">
      <div class="rest-card-top">
        <span class="rest-flag">${est.flag}</span>
        <div><div class="rest-name">${est.name}</div><div class="rest-cuisine">${est.cuisine}</div></div>
      </div>
    </div>
    <div class="phrase-box">
      🗣️ <strong>Use these phrases when ordering:</strong><br>
      • <em>"I'd like to order the <strong>___</strong>, please."</em><br>
      • <em>"Could I have the <strong>___</strong>?"</em><br>
      • <em>"I would like a <strong>___</strong> and a <strong>___</strong>."</em><br>
      • <em>"Can I also have <strong>___</strong>?"</em>
    </div>
    <div style="background:var(--surface2);border-radius:8px;padding:8px;margin-bottom:10px;font-size:.78rem">
      👤 <b>Customer:</b> ${p.name} &nbsp;|&nbsp; 🍽️ <b>Waiter:</b> <span style="color:#3b82f6">${w.name}</span>
    </div>
    <button class="btn btn-gold btn-block" onclick="gs.phase='ordering';gs.sel=[];render()">
      📋 View Menu & Order
    </button>`;
}

// ── ORDERING ──
function renderOrdering() {
  const p   = gs.players[gs.cur];
  const est = EST[p.pos];
  const w   = gs.players[waiterIdx()];
  const tot = gs.sel.reduce((s,x) => s+x.p, 0);
  const over = tot > p.money;

  const menuHTML = SECTIONS.map(sec => {
    const items = est.menu[sec.key].map((item, idx) => {
      const key  = `${sec.key}|${idx}`;
      const isSel = gs.sel.some(x => x.key === key);
      return `<div class="mi ${isSel?'sel':''}" onclick="toggleItem('${sec.key}',${idx})">
        <span>${item.n}</span><span class="mi-price">$${item.p}</span>
      </div>`;
    }).join('');
    return `<div class="msec-title">${sec.label}</div>${items}`;
  }).join('');

  const orderLines = gs.sel.length
    ? gs.sel.map(x=>`<div class="o-item"><span>${x.n}</span><span style="color:#1db954">$${x.p}</span></div>`).join('')
    : `<div style="color:var(--muted);font-size:.78rem">No items selected yet</div>`;

  return `<div class="rest-card" style="background:linear-gradient(135deg,${est.color},${est.color}88);padding:9px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:1.4rem">${est.flag}</span>
        <div><div style="font-weight:800;font-size:.88rem">${est.name}</div><div style="font-size:.68rem;opacity:.8">${est.cuisine}</div></div>
        <div style="margin-left:auto;font-size:.75rem;color:#1db954">💰 $${p.money}</div>
      </div>
    </div>
    <div style="background:#0d1628;border:1px solid #1a2a50;border-radius:8px;padding:7px;margin-bottom:8px;font-size:.75rem">
      🍽️ <b>Waiter:</b> <span style="color:#3b82f6">${w.name}</span>
      &nbsp;|&nbsp; 👤 <b>Customer:</b> ${p.name}
    </div>
    <div class="menu-wrap">${menuHTML}</div>
    <div class="order-box">
      <div style="font-size:.65rem;color:var(--muted);margin-bottom:4px">🛒 Your Order</div>
      ${orderLines}
      ${gs.sel.length ? `<div class="o-total"><span>Total</span><span style="color:${over?'var(--accent)':'#1db954'}">$${tot}</span></div>
        <div class="${over?'warn':'ok-msg'}">${over?`⚠️ Over budget! You have $${p.money}`:`✅ Within budget — $${p.money-tot} left`}</div>` : ''}
    </div>
    ${gs.sel.length && !over
      ? `<button class="btn btn-green btn-block" onclick="confirmOrder()">✅ Confirm Order</button>`
      : `<button class="btn btn-ghost btn-block" disabled>Select items to confirm</button>`}`;
}

// ── ORDER SCORE ──
function renderOrderScore() {
  const o   = gs.orders[gs.orders.length-1];
  const p   = gs.players[o.pi];
  const est = EST[o.estIdx];
  return `<div class="ap-title">⭐ Order Quality — Teacher Marks</div>
    <div class="ap-heading">${p.name} ordered at ${est.name}</div>
    <div class="ap-sub">Did <b>${p.name}</b> use the correct English phrases?<br>
      <em>"I'd like to order…"</em> / <em>"Could I have…"</em> / <em>"I would like…"</em></div>
    <div class="order-box" style="margin-bottom:10px">
      ${o.items.map(x=>`<div class="o-item"><span>${x.n}</span><span style="color:#1db954">$${x.p}</span></div>`).join('')}
      <div class="o-total"><span>Total Spent</span><span>$${o.total}</span></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <button class="btn btn-green ${o.oScore===true?'':'btn-ghost'}" onclick="markOrderScore(true)">
        ✅ Correct Phrases<br><small style="font-weight:400">+15 pts</small>
      </button>
      <button class="btn btn-primary ${o.oScore===false?'':'btn-ghost'}" onclick="markOrderScore(false)">
        ❌ Incorrect<br><small style="font-weight:400">No points</small>
      </button>
    </div>
    ${o.oScore !== null
      ? `<button class="btn btn-gold btn-block" onclick="nextTurn()">
          ${allOrdered() ? '🍽️ Start Delivery Round →' : '➡️ Next Player →'}
        </button>`
      : `<div style="text-align:center;font-size:.75rem;color:var(--muted)">Mark order quality to continue</div>`}`;
}

// ── DELIVERY ──
function renderDelivery() {
  const allMarked = gs.orders.every(o => o.dScore !== null);
  const cards = gs.orders.map((o,i) => {
    const est = EST[o.estIdx];
    const w   = gs.players[o.waiterId];
    const cu  = gs.players[o.pi];
    return `<div class="rv-card">
      <div class="rv-top">
        <div class="rv-info">
          <div class="rv-name">${est.flag} ${cu.name} <span style="color:var(--muted);font-weight:400;font-size:.72rem">@ ${est.name}</span></div>
          <div class="rv-sub" style="color:#3b82f6">🍽️ Waiter: ${w.name} — say the order aloud!</div>
        </div>
        <div class="mark-row">
          <button class="mk mk-ok ${o.dScore===true?'on':''}" onclick="markDelivery(${i},true)" title="+15 pts +$10">✓</button>
          <button class="mk mk-no ${o.dScore===false?'on':''}" onclick="markDelivery(${i},false)" title="No points">✗</button>
        </div>
      </div>
      <div class="rv-items">${o.items.map(x=>`${x.n} ($${x.p})`).join(', ')}</div>
      ${o.dScore!==null?`<div class="rv-result" style="color:${o.dScore?'#1db954':'var(--accent)'}">${o.dScore?'✅ +15 pts & +$10 for waiter':'❌ No points'}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="ap-title">🍽️ Delivery Round — Teacher Marks</div>
    <div class="ap-sub" style="margin-bottom:8px">Each waiter must say out loud what their customer ordered. Mark if correct!</div>
    ${cards}
    ${allMarked
      ? `<button class="btn btn-gold btn-block" onclick="gs.phase='billing';render()">💳 Proceed to Billing →</button>`
      : `<div style="text-align:center;font-size:.72rem;color:var(--muted);margin-top:4px">Mark all deliveries to continue</div>`}`;
}

// ── BILLING ──
function renderBilling() {
  const allMarked = gs.orders.every(o => o.bScore !== null);
  const cards = gs.orders.map((o,i) => {
    const est = EST[o.estIdx];
    const cu  = gs.players[o.pi];
    return `<div class="rv-card">
      <div class="rv-top">
        <div class="rv-info">
          <div class="rv-name">${est.flag} ${cu.name}</div>
          <div class="rv-sub">Present the bill in English! e.g. <em>"Your total is $${o.total}, please."</em></div>
        </div>
        <div class="mark-row">
          <button class="mk mk-ok ${o.bScore===true?'on':''}" onclick="markBilling(${i},true)" title="+10 pts">✓</button>
          <button class="mk mk-no ${o.bScore===false?'on':''}" onclick="markBilling(${i},false)" title="No points">✗</button>
        </div>
      </div>
      <div class="rv-items">${o.items.map(x=>`${x.n}: $${x.p}`).join(' | ')}</div>
      <div style="font-size:.8rem;font-weight:800;border-top:1px solid var(--border);margin-top:4px;padding-top:4px">
        Bill Total: <span style="color:#1db954">$${o.total}</span>
      </div>
      ${o.bScore!==null?`<div class="rv-result" style="color:${o.bScore?'#1db954':'var(--accent)'}">${o.bScore?'✅ +10 pts':'❌ No points'}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="ap-title">💳 Billing Round — Teacher Marks</div>
    <div class="ap-sub" style="margin-bottom:8px">Each customer presents their bill. Did they say the total correctly in English?</div>
    ${cards}
    ${allMarked
      ? `<button class="btn btn-primary btn-block" onclick="gs.phase='roundEnd';render()">🏆 See Round Results →</button>`
      : `<div style="text-align:center;font-size:.72rem;color:var(--muted);margin-top:4px">Mark all bills to continue</div>`}`;
}

// ── ROUND END ──
function renderRoundEnd() {
  const sorted = [...gs.players].map((p,i)=>({...p,i})).sort((a,b)=>b.score-a.score);
  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
  const rows = sorted.map((p,rank) => `
    <div class="score-row ${rank===0?'gold-row':'norm-row'}">
      <span class="score-rank">${medals[rank]}</span>
      <div class="pc-dot" style="background:${p.color}"></div>
      <div class="score-name">
        ${p.name}
        <div style="font-size:.65rem;color:var(--muted);font-weight:400">💰 $${p.money} remaining</div>
      </div>
      <span class="score-pts">${p.score} pts</span>
    </div>`).join('');

  const pointSummary = gs.orders.map(o => {
    const p = gs.players[o.pi];
    const w = gs.players[o.waiterId];
    return `<div style="font-size:.74rem;padding:3px 0;border-bottom:1px solid var(--border)">
      <span style="color:${p.color}">●</span> ${p.name}: 
      Order ${o.oScore===true?'<span style="color:#1db954">+15</span>':o.oScore===false?'<span style="color:var(--accent)">0</span>':'<span style="color:#555">—</span>'} &nbsp;|&nbsp;
      <span style="color:${w.color}">●</span> ${w.name} delivery:
      ${o.dScore===true?'<span style="color:#1db954">+15</span>':o.dScore===false?'<span style="color:var(--accent)">0</span>':'<span style="color:#555">—</span>'} &nbsp;|&nbsp;
      Billing ${o.bScore===true?'<span style="color:#1db954">+10</span>':o.bScore===false?'<span style="color:var(--accent)">0</span>':'<span style="color:#555">—</span>'}
    </div>`;
  }).join('');

  return `<div class="ap-title">🏆 Round ${gs.round} Results</div>
    ${rows}
    <div class="sep"></div>
    <div class="ap-title">Points Breakdown</div>
    ${pointSummary}
    <div class="sep"></div>
    <button class="btn btn-primary btn-block" onclick="nextRound()">🔄 Start Round ${gs.round+1} →</button>`;
}

// ═══════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2600);
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
renderSetup();
</script>
</body>
</html>
