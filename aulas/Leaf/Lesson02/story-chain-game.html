<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Chain Game – Leaf Lesson 02</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #11998e;
      --green2:  #38ef7d;
      --dark:    #1a2a2a;
      --card-bg: #ffffff;
      --shadow:  0 8px 32px rgba(0,0,0,.18);
      --radius:  14px;
      --action-color:  #305EBC;
      --time-color:    #e05c2a;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      color: #eee;
      padding: 20px;
    }

    /* ===== LAYOUT ===== */
    .wrapper {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    /* ===== HEADER ===== */
    header {
      text-align: center;
      padding: 28px 20px 18px;
      background: rgba(255,255,255,.06);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,.12);
    }
    header .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--green), var(--green2));
      color: #0d1f1f;
      font-weight: 700;
      font-size: .75rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 50px;
      margin-bottom: 10px;
    }
    header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
    header p  { opacity: .7; font-size: .95rem; margin-top: 6px; }

    /* ===== PLAYER TURN BAR ===== */
    #turn-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(255,255,255,.07);
      border-radius: var(--radius);
      padding: 14px 20px;
      border: 1px solid rgba(255,255,255,.1);
    }
    #turn-bar .label { font-size: .85rem; opacity: .65; text-transform: uppercase; letter-spacing: 1px; }
    #turn-bar .player-name { font-size: 1.2rem; font-weight: 700; color: var(--green2); }
    #turn-bar .player-num  { font-size: .9rem; opacity: .5; }

    /* ===== CARDS AREA ===== */
    .cards-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .card-slot {
      perspective: 900px;
    }
    .card-inner {
      position: relative;
      width: 100%;
      min-height: 160px;
      transform-style: preserve-3d;
      transition: transform .6s cubic-bezier(.4,0,.2,1);
      border-radius: var(--radius);
    }
    .card-slot.flipped .card-inner { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      width: 100%; height: 100%;
      backface-visibility: hidden;
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      text-align: center;
      border: 2px solid rgba(255,255,255,.12);
    }
    /* front (hidden face) */
    .card-face.front {
      background: rgba(255,255,255,.07);
      cursor: pointer;
    }
    .card-face.front .card-icon { font-size: 3rem; opacity: .5; }
    .card-face.front .card-hint { font-size: .9rem; opacity: .45; }

    /* back (revealed face) */
    .card-face.back { transform: rotateY(180deg); }

    .card-slot.action .card-face.back  { background: linear-gradient(135deg, #1a2a6c, #305EBC); }
    .card-slot.time   .card-face.back  { background: linear-gradient(135deg, #7b2d00, #e05c2a); }

    .card-face.back .card-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: .7;
    }
    .card-face.back .card-value {
      font-size: 1.35rem;
      font-weight: 800;
      line-height: 1.3;
    }
    .card-face.back .card-example {
      font-size: .78rem;
      opacity: .65;
      font-style: italic;
      margin-top: 4px;
    }

    /* ===== DRAW BUTTON ===== */
    #draw-btn {
      width: 100%;
      padding: 18px;
      font-size: 1.15rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--green), var(--green2));
      color: #0d1f1f;
      cursor: pointer;
      letter-spacing: .5px;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 20px rgba(56,239,125,.3);
    }
    #draw-btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(56,239,125,.4); }
    #draw-btn:active { transform: translateY(0); }
    #draw-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ===== CHALLENGE BOX ===== */
    #challenge-box {
      background: rgba(255,255,255,.06);
      border: 2px dashed rgba(255,255,255,.2);
      border-radius: var(--radius);
      padding: 22px 24px;
      display: none;
    }
    #challenge-box .ch-label {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: .5;
      margin-bottom: 8px;
    }
    #challenge-box .ch-text {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #fff;
    }
    #challenge-box .ch-text strong { color: var(--green2); }
    #challenge-box .ch-text em    { color: #ffa07a; font-style: normal; font-weight: 600; }

    /* ===== INPUT AREA ===== */
    #input-area {
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    #sentence-input {
      width: 100%;
      padding: 16px 18px;
      font-size: 1rem;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08);
      color: #fff;
      resize: none;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color .2s;
    }
    #sentence-input::placeholder { opacity: .4; }
    #sentence-input:focus { outline: none; border-color: var(--green2); }

    .input-row {
      display: flex;
      gap: 10px;
    }
    .btn-secondary {
      flex: 1;
      padding: 13px;
      font-size: .95rem;
      font-weight: 600;
      border: 2px solid rgba(255,255,255,.2);
      border-radius: 10px;
      background: transparent;
      color: #eee;
      cursor: pointer;
      transition: background .2s, border-color .2s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.4); }

    .btn-add {
      flex: 2;
      padding: 13px;
      font-size: .95rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      background: var(--action-color);
      color: #fff;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .btn-add:hover { background: #3d70d6; }
    .btn-add:active { transform: scale(.98); }

    /* ===== GRAMMAR REMINDER ===== */
    #grammar-tip {
      background: rgba(255,255,255,.05);
      border-left: 4px solid var(--green);
      border-radius: 0 10px 10px 0;
      padding: 14px 18px;
      font-size: .85rem;
      line-height: 1.7;
      display: none;
    }
    #grammar-tip .tip-title { font-weight: 700; color: var(--green2); margin-bottom: 6px; }
    #grammar-tip code {
      background: rgba(255,255,255,.1);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: 'Courier New', monospace;
      font-size: .9em;
    }

    /* ===== STORY CHAIN ===== */
    #story-section {
      display: none;
      flex-direction: column;
      gap: 14px;
    }
    .story-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .story-header h3 { font-size: 1rem; font-weight: 700; letter-spacing: .5px; opacity: .8; }
    #clear-story-btn {
      font-size: .78rem;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,50,50,.4);
      background: transparent;
      color: #ff7070;
      cursor: pointer;
      transition: background .2s;
    }
    #clear-story-btn:hover { background: rgba(255,50,50,.15); }

    #story-chain {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .story-item {
      background: rgba(255,255,255,.06);
      border-radius: 10px;
      padding: 14px 18px;
      border-left: 4px solid transparent;
      animation: fadeIn .35s ease;
      font-size: .97rem;
      line-height: 1.5;
    }
    .story-item .si-meta {
      font-size: .72rem;
      opacity: .45;
      margin-bottom: 5px;
      letter-spacing: .5px;
    }
    .story-item .si-text { color: #fff; }
    .story-item:nth-child(5n+1) { border-left-color: #305EBC; }
    .story-item:nth-child(5n+2) { border-left-color: #e05c2a; }
    .story-item:nth-child(5n+3) { border-left-color: var(--green); }
    .story-item:nth-child(5n+4) { border-left-color: #a855f7; }
    .story-item:nth-child(5n+5) { border-left-color: #f59e0b; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== PLAYERS MANAGER ===== */
    #players-section {
      background: rgba(255,255,255,.05);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid rgba(255,255,255,.1);
    }
    #players-section h3 { font-size: .9rem; font-weight: 700; opacity: .6; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
    .player-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .player-chip {
      padding: 6px 14px;
      border-radius: 50px;
      font-size: .85rem;
      font-weight: 600;
      background: rgba(255,255,255,.1);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all .2s;
    }
    .player-chip.active { background: var(--green); color: #0d1f1f; border-color: var(--green2); }
    .player-chip.remove-mode { border-color: rgba(255,80,80,.5); }

    .add-player-row {
      display: flex;
      gap: 8px;
    }
    #new-player-input {
      flex: 1;
      padding: 9px 14px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.07);
      color: #fff;
      font-size: .9rem;
      font-family: inherit;
    }
    #new-player-input:focus { outline: none; border-color: var(--green2); }
    #add-player-btn {
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      background: var(--green);
      color: #0d1f1f;
      font-weight: 700;
      cursor: pointer;
      font-size: .9rem;
    }

    /* ===== SCORE BOARD ===== */
    #score-section {
      background: rgba(255,255,255,.05);
      border-radius: var(--radius);
      padding: 18px 20px;
      border: 1px solid rgba(255,255,255,.1);
    }
    #score-section h3 { font-size: .85rem; font-weight: 700; opacity: .6; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
    .score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
      font-size: .92rem;
    }
    .score-row:last-child { border-bottom: none; }
    .score-name  { opacity: .85; }
    .score-pts   { font-weight: 700; color: var(--green2); }
    .score-turns { font-size: .75rem; opacity: .4; margin-left: 10px; }

    /* ===== TOAST ===== */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(30,30,30,.95);
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: .9rem;
      font-weight: 600;
      z-index: 9999;
      transition: transform .3s ease, opacity .3s ease;
      opacity: 0;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,.15);
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 560px) {
      .cards-area { grid-template-columns: 1fr; }
      header h1 { font-size: 1.4rem; }
      .input-row { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="badge">🍃 Leaf · Lesson 02</div>
    <h1>📖 Story Chain Game</h1>
    <p>Past Continuous &amp; Interrupted Actions &nbsp;·&nbsp; Online Classroom Edition</p>
  </header>

  <!-- PLAYERS SETUP -->
  <div id="players-section">
    <h3>👥 Players</h3>
    <div class="player-list" id="player-list"></div>
    <div class="add-player-row">
      <input id="new-player-input" type="text" placeholder="Player name…" maxlength="20" />
      <button id="add-player-btn" onclick="addPlayer()">＋ Add</button>
    </div>
  </div>

  <!-- TURN BAR -->
  <div id="turn-bar">
    <div>
      <div class="label">Current Turn</div>
      <div class="player-name" id="current-player-name">—</div>
    </div>
    <div class="player-num" id="turn-counter">Turn 0</div>
  </div>

  <!-- DRAW BUTTON -->
  <button id="draw-btn" onclick="drawCards()">🎲 Draw Cards</button>

  <!-- CARDS -->
  <div class="cards-area">
    <div class="card-slot action" id="card-action">
      <div class="card-inner">
        <div class="card-face front">
          <div class="card-icon">🎭</div>
          <div class="card-hint">Action Card</div>
        </div>
        <div class="card-face back">
          <div class="card-label">🎭 Action</div>
          <div class="card-value" id="action-value">—</div>
          <div class="card-example" id="action-example"></div>
        </div>
      </div>
    </div>
    <div class="card-slot time" id="card-time">
      <div class="card-inner">
        <div class="card-face front">
          <div class="card-icon">⏰</div>
          <div class="card-hint">Time Expression</div>
        </div>
        <div class="card-face back">
          <div class="card-label">⏰ Time Expression</div>
          <div class="card-value" id="time-value">—</div>
          <div class="card-example" id="time-example"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- CHALLENGE BOX -->
  <div id="challenge-box">
    <div class="ch-label">📝 Your Challenge</div>
    <div class="ch-text" id="challenge-text"></div>
  </div>

  <!-- GRAMMAR TIP -->
  <div id="grammar-tip">
    <div class="tip-title">💡 Grammar Reminder</div>
    <div id="tip-content"></div>
  </div>

  <!-- INPUT AREA -->
  <div id="input-area">
    <textarea id="sentence-input" rows="3"
      placeholder="Write your sentence continuing the story…"></textarea>
    <div class="input-row">
      <button class="btn-secondary" onclick="toggleTip()">💡 Grammar Tip</button>
      <button class="btn-secondary" onclick="skipTurn()">⏭ Skip</button>
      <button class="btn-add"       onclick="addSentence()">✅ Add to Story</button>
    </div>
  </div>

  <!-- STORY CHAIN -->
  <div id="story-section">
    <div class="story-header">
      <h3>📚 The Story So Far…</h3>
      <button id="clear-story-btn" onclick="clearStory()">🗑 New Story</button>
    </div>
    <div id="story-chain"></div>
  </div>

  <!-- SCORE -->
  <div id="score-section">
    <h3>🏆 Scoreboard</h3>
    <div id="scoreboard"></div>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* =====================================================================
   DATA
===================================================================== */
const ACTION_CARDS = [
  { value: "cooking dinner",       example: "was cooking dinner in the kitchen" },
  { value: "watching TV",          example: "was watching their favorite show" },
  { value: "reading a book",       example: "was reading in the living room" },
  { value: "sleeping deeply",      example: "was sleeping when it happened" },
  { value: "walking in the park",  example: "was walking and enjoying the sun" },
  { value: "talking on the phone", example: "was talking to an old friend" },
  { value: "listening to music",   example: "was listening to loud music" },
  { value: "studying for an exam", example: "was studying late at night" },
  { value: "writing a letter",     example: "was carefully writing a letter" },
  { value: "eating breakfast",     example: "was eating quietly at the table" },
  { value: "driving to work",      example: "was driving on the highway" },
  { value: "playing with the dog", example: "was playing outside with the dog" },
  { value: "taking a shower",      example: "was taking a hot shower" },
  { value: "shopping at the mall", example: "was shopping for new clothes" },
  { value: "waiting for the bus",  example: "was waiting in the cold" },
  { value: "running in the park",  example: "was running her usual morning route" },
  { value: "working at the computer", example: "was working on an important project" },
  { value: "drinking coffee",      example: "was drinking coffee and daydreaming" },
  { value: "washing the dishes",   example: "was washing dishes after dinner" },
  { value: "painting a picture",   example: "was painting quietly in the studio" },
  { value: "fixing the car",       example: "was fixing the engine in the garage" },
  { value: "baking a cake",        example: "was baking a chocolate cake" },
  { value: "feeding the cat",      example: "was feeding the cat by the window" },
  { value: "doing yoga",           example: "was doing yoga in the garden" },
];

const TIME_CARDS = [
  {
    value:   "when suddenly",
    example: "… when suddenly something unexpected happened.",
    tip:     "Use <code>when suddenly</code> to show an abrupt interruption.<br>Structure: <code>was/were + -ing &nbsp;+&nbsp; when suddenly &nbsp;+&nbsp; Simple Past</code>"
  },
  {
    value:   "while … , …",
    example: "While she was …, he was …",
    tip:     "Use <code>while</code> when two continuous actions happen at the same time.<br>Structure: <code>While + was/were -ing, &nbsp;+ another was/were -ing</code>"
  },
  {
    value:   "when I arrived",
    example: "… when I arrived at the scene.",
    tip:     "Use <code>when + Simple Past</code> to interrupt a continuous action.<br>Structure: <code>was/were -ing &nbsp;+&nbsp; when &nbsp;+&nbsp; Simple Past</code>"
  },
  {
    value:   "meanwhile",
    example: "Meanwhile, somewhere else, …",
    tip:     "<code>Meanwhile</code> connects two simultaneous Past Continuous actions in different places.<br>Tip: Start with <em>Meanwhile, + subject + was/were -ing</em>"
  },
  {
    value:   "at that moment",
    example: "… at that exact moment.",
    tip:     "<code>At that moment</code> freezes the story on one continuous action.<br>Structure: <code>subject + was/were -ing &nbsp;+&nbsp; at that moment</code>"
  },
  {
    value:   "when the phone rang",
    example: "… when the phone rang.",
    tip:     "Classic interruption pattern!<br>Structure: <code>was/were -ing &nbsp;+&nbsp; when the phone rang</code>"
  },
  {
    value:   "just then",
    example: "Just then, everything changed.",
    tip:     "<code>Just then</code> signals a sudden change of event.<br>Use it to switch from Past Continuous to Simple Past."
  },
  {
    value:   "when it started raining",
    example: "… when it started raining.",
    tip:     "Two past events: one ongoing, one that starts.<br>Structure: <code>was/were -ing &nbsp;+&nbsp; when &nbsp;+&nbsp; Simple Past</code>"
  },
  {
    value:   "during this time",
    example: "During this time, no one noticed…",
    tip:     "<code>During this time</code> keeps the action ongoing in the background.<br>Follow it with Past Continuous."
  },
  {
    value:   "when the lights went out",
    example: "… when the lights suddenly went out.",
    tip:     "A dramatic interruption! Past Continuous sets the scene, Simple Past interrupts.<br><code>was/were -ing &nbsp;+&nbsp; when + Simple Past</code>"
  },
  {
    value:   "while everyone was watching",
    example: "… while everyone was watching.",
    tip:     "Parallel actions! Both activities are continuous.<br>Structure: <code>was/were -ing &nbsp;+&nbsp; while &nbsp;+&nbsp; was/were -ing</code>"
  },
  {
    value:   "when she walked in",
    example: "… when she walked in unexpectedly.",
    tip:     "The walk interrupts the ongoing action.<br>Structure: <code>was/were -ing &nbsp;+&nbsp; when &nbsp;+&nbsp; Simple Past</code>"
  },
];

/* =====================================================================
   STATE
===================================================================== */
let players    = [];
let scores     = {}; // { name: { points, turns } }
let turnIndex  = 0;
let turnCount  = 0;
let storyItems = [];
let currentAction = null;
let currentTime   = null;
let tipVisible    = false;
let lastActionIdx = -1;
let lastTimeIdx   = -1;

/* =====================================================================
   PLAYERS
===================================================================== */
function addPlayer() {
  const input = document.getElementById('new-player-input');
  const name  = input.value.trim();
  if (!name) return;
  if (players.includes(name)) { showToast('Player already exists!'); return; }
  if (players.length >= 6)    { showToast('Max 6 players!'); return; }
  players.push(name);
  scores[name] = { points: 0, turns: 0 };
  input.value = '';
  renderPlayers();
  renderScoreboard();
  updateTurnBar();
}
document.getElementById('new-player-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPlayer();
});

function renderPlayers() {
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  players.forEach((p, i) => {
    const chip = document.createElement('div');
    chip.className = 'player-chip' + (i === turnIndex ? ' active' : '');
    chip.textContent = p;
    chip.title = 'Click to remove';
    chip.onclick = () => removePlayer(p);
    list.appendChild(chip);
  });
}

function removePlayer(name) {
  if (!confirm(`Remove ${name}?`)) return;
  const idx = players.indexOf(name);
  players.splice(idx, 1);
  delete scores[name];
  if (turnIndex >= players.length) turnIndex = 0;
  renderPlayers();
  renderScoreboard();
  updateTurnBar();
}

/* =====================================================================
   TURN
===================================================================== */
function currentPlayer() {
  return players.length ? players[turnIndex] : null;
}

function updateTurnBar() {
  const p = currentPlayer();
  document.getElementById('current-player-name').textContent = p || 'Add players above ↑';
  document.getElementById('turn-counter').textContent = `Turn ${turnCount}`;
}

function nextTurn() {
  if (!players.length) return;
  turnIndex = (turnIndex + 1) % players.length;
  turnCount++;
  updateTurnBar();
  renderPlayers();
}

/* =====================================================================
   DRAW CARDS
===================================================================== */
function pickRandom(arr, lastIdx) {
  let idx;
  do { idx = Math.floor(Math.random() * arr.length); } while (arr.length > 1 && idx === lastIdx);
  return { item: arr[idx], idx };
}

function drawCards() {
  if (!players.length) { showToast('Add at least one player first! 👆'); return; }

  // Reset flip
  document.getElementById('card-action').classList.remove('flipped');
  document.getElementById('card-time').classList.remove('flipped');

  setTimeout(() => {
    const a = pickRandom(ACTION_CARDS, lastActionIdx);
    const t = pickRandom(TIME_CARDS,   lastTimeIdx);
    lastActionIdx = a.idx;
    lastTimeIdx   = t.idx;
    currentAction = a.item;
    currentTime   = t.item;

    document.getElementById('action-value').textContent   = currentAction.value;
    document.getElementById('action-example').textContent = currentAction.example;
    document.getElementById('time-value').textContent     = currentTime.value;
    document.getElementById('time-example').textContent   = currentTime.example;

    // Flip with delay between cards
    setTimeout(() => document.getElementById('card-action').classList.add('flipped'), 50);
    setTimeout(() => document.getElementById('card-time').classList.add('flipped'), 300);

    // Challenge text
    const challengeBox = document.getElementById('challenge-box');
    const p = currentPlayer();
    document.getElementById('challenge-text').innerHTML =
      `<strong>${p}</strong>, use the action "<em>${currentAction.value}</em>" and the expression "<em>${currentTime.value}</em>" to write a sentence that continues the story using <strong>Past Continuous</strong>.`;
    challengeBox.style.display = 'block';

    // Tip
    document.getElementById('tip-content').innerHTML = currentTime.tip;
    document.getElementById('grammar-tip').style.display = 'none';
    tipVisible = false;

    // Input area
    const inputArea = document.getElementById('input-area');
    inputArea.style.display = 'flex';
    document.getElementById('sentence-input').value = '';
    document.getElementById('sentence-input').focus();

    // Disable draw button until sentence is added or skipped
    document.getElementById('draw-btn').disabled = true;
  }, 200);
}

/* =====================================================================
   SENTENCE
===================================================================== */
function addSentence() {
  const input = document.getElementById('sentence-input');
  const text  = input.value.trim();
  if (!text) { showToast('Write your sentence first! ✍️'); return; }

  const p = currentPlayer();
  const item = { player: p, action: currentAction.value, time: currentTime.value, text };
  storyItems.push(item);

  // Score: +2 pts if contains was/were -ing, +1 bonus for time expression keyword
  let pts = 1;
  if (/\b(was|were)\b.*ing\b/i.test(text)) pts += 1;
  const keyword = currentTime.value.split(' ')[0].toLowerCase();
  if (text.toLowerCase().includes(keyword)) pts += 1;
  scores[p].points += pts;
  scores[p].turns  += 1;

  showToast(`+${pts} point${pts > 1 ? 's' : ''} for ${p}! 🎉`);
  renderStory();
  renderScoreboard();
  resetRound();
  nextTurn();
}

function skipTurn() {
  const p = currentPlayer();
  scores[p].turns += 1;
  showToast(`${p} skipped this turn.`);
  resetRound();
  nextTurn();
}

function resetRound() {
  document.getElementById('input-area').style.display   = 'none';
  document.getElementById('challenge-box').style.display = 'none';
  document.getElementById('grammar-tip').style.display  = 'none';
  document.getElementById('sentence-input').value = '';
  document.getElementById('draw-btn').disabled = false;
  tipVisible = false;
}

/* =====================================================================
   GRAMMAR TIP TOGGLE
===================================================================== */
function toggleTip() {
  tipVisible = !tipVisible;
  document.getElementById('grammar-tip').style.display = tipVisible ? 'block' : 'none';
}

/* =====================================================================
   STORY RENDER
===================================================================== */
function renderStory() {
  const section = document.getElementById('story-section');
  const chain   = document.getElementById('story-chain');
  section.style.display = 'flex';
  chain.innerHTML = '';
  storyItems.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'story-item';
    div.innerHTML = `
      <div class="si-meta">${i + 1}. ${item.player} &nbsp;·&nbsp; 🎭 ${item.action} &nbsp;·&nbsp; ⏰ ${item.time}</div>
      <div class="si-text">${item.text}</div>
    `;
    chain.appendChild(div);
  });
  // Scroll to bottom
  chain.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function clearStory() {
  if (!storyItems.length) return;
  if (!confirm('Start a new story? (Scores are kept)')) return;
  storyItems = [];
  document.getElementById('story-section').style.display = 'none';
  document.getElementById('story-chain').innerHTML = '';
  showToast('New story started! 📖');
}

/* =====================================================================
   SCOREBOARD
===================================================================== */
function renderScoreboard() {
  const board = document.getElementById('scoreboard');
  if (!players.length) { board.innerHTML = '<div style="opacity:.4;font-size:.85rem">No players yet.</div>'; return; }

  const sorted = [...players].sort((a, b) => (scores[b]?.points ?? 0) - (scores[a]?.points ?? 0));
  board.innerHTML = sorted.map((p, i) => `
    <div class="score-row">
      <span class="score-name">${i === 0 ? '🥇 ' : i === 1 ? '🥈 ' : i === 2 ? '🥉 ' : '    '}${p}</span>
      <span>
        <span class="score-pts">${scores[p]?.points ?? 0} pts</span>
        <span class="score-turns">${scores[p]?.turns ?? 0} turns</span>
      </span>
    </div>
  `).join('');
}

/* =====================================================================
   TOAST
===================================================================== */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

/* =====================================================================
   INIT
===================================================================== */
renderPlayers();
renderScoreboard();
updateTurnBar();

// Add default players for quick demo (teacher can remove)
['Player 1', 'Player 2', 'Player 3'].forEach(n => {
  players.push(n);
  scores[n] = { points: 0, turns: 0 };
});
renderPlayers();
renderScoreboard();
updateTurnBar();
</script>
